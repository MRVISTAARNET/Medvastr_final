# ============================================================
# MEDVASTR BACKEND — application.properties (local / default)
# Set secrets via environment variables — never commit real values.
# ============================================================

server.port=8080
spring.application.name=medvastr

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medvastr_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.devtools.restart.enabled=false

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dev-only-change-me-use-64-char-random-string-for-production-abc123}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# ── Frontend URL ─────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:https://www.medvastr.com}

# ── Admin bootstrap (only creates admin if not already exists) ──
app.admin.email=${ADMIN_EMAIL:medvastr@gmail.com}
app.admin.password=${ADMIN_INITIAL_PASSWORD:}

# ── Razorpay ─────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# ── Shiprocket ───────────────────────────────────────────────
shiprocket.enabled=${SHIPROCKET_ENABLED:false}
shiprocket.email=${SHIPROCKET_EMAIL:}
shiprocket.password=${SHIPROCKET_PASSWORD:}
shiprocket.pickup_location=${SHIPROCKET_PICKUP_LOCATION:work}
shiprocket.pickup_postcode=${SHIPROCKET_PICKUP_POSTCODE:400063}

# ── SMTP ─────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtpout.secureserver.net}
spring.mail.port=${MAIL_PORT:587}
spring.mail.protocol=smtp
spring.mail.username=${MAIL_USERNAME:info@medvastr.com}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false

spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=30MB

# ── AWS S3 (prefer IAM role on EB; leave keys empty in production) ──
aws.s3.bucket-name=${AWS_S3_BUCKET:medvastr-assets}
aws.s3.region=${AWS_S3_REGION:ap-south-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretKey=${AWS_SECRET_ACCESS_KEY:}

# ── OpenAPI / Swagger (enabled for local dev) ──────────────────
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# ── Logging ──────────────────────────────────────────────────
logging.level.com.medvastr=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Connection Pool (supports ~10k concurrent users) ──────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── WhatsApp Notifications ───────────────────────────────────
whatsapp.enabled=${WHATSAPP_ENABLED:false}
whatsapp.api.url=${WHATSAPP_API_URL:}
whatsapp.api.key=${WHATSAPP_API_KEY:}
whatsapp.admin.numbers=${WHATSAPP_ADMIN_NUMBERS:}

# ── MSG91 SMS Configuration ──────────────────────────────────
msg91.enabled=${MSG91_ENABLED:false}
msg91.authkey=${MSG91_AUTH_KEY:}
msg91.sender.default=${MSG91_SENDER_DEFAULT:MDVSTR}
msg91.sender.otp=${MSG91_SENDER_OTP:MVSOTP}
msg91.flow.otp=${MSG91_FLOW_OTP:}
msg91.flow.order.cod=${MSG91_FLOW_ORDER_COD:}
msg91.flow.order.prepaid=${MSG91_FLOW_ORDER_PREPAID:}
msg91.flow.order.dispatched=${MSG91_FLOW_ORDER_DISPATCHED:}
msg91.template.otp=${MSG91_TEMPLATE_OTP:}
msg91.template.order.cod=${MSG91_TEMPLATE_ORDER_COD:}
msg91.template.order.prepaid=${MSG91_TEMPLATE_ORDER_PREPAID:}
msg91.template.order.dispatched=${MSG91_TEMPLATE_ORDER_DISPATCHED:}
