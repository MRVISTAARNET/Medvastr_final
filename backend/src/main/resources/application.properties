# ============================================================
# MEDVASTR BACKEND — application.properties
# ============================================================

server.port=8080
spring.application.name=medvastr

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medvastr_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — NEVER use create/create-drop in production; use validate once schema is stable
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable DevTools restart (prevents backend from restarting when frontend files change)
spring.devtools.restart.enabled=false

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:MedvastrSuperSecretJwtKey2026PremiumMedicalApparelMumbaiIndia!}
app.jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# ── Frontend URL (used inside password-reset email links) ────
# Change this to your real domain before going to production
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ── Razorpay ─────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY:rzp_test_SvSswUyEl4VChG}
razorpay.key.secret=${RAZORPAY_SECRET:WUVoXF1srduqdKTbmQjpHztd}

# ── Shiprocket ───────────────────────────────────────────────
shiprocket.enabled=${SHIPROCKET_ENABLED:true}
shiprocket.email=${SHIPROCKET_EMAIL:info@medvastr.com}
shiprocket.password=${SHIPROCKET_PASSWORD:Medvastr_@123}

# ── Titan Mail SMTP (password reset emails) ───────────────────
spring.mail.host=smtp.titan.email
spring.mail.port=587
spring.mail.username=${MAIL_USER:info@medvastr.com}
spring.mail.password=${MAIL_PASS:Medvastr@_1234}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── Logging ──────────────────────────────────────────────────
logging.level.com.medvastr=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

