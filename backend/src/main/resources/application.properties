# ============================================================
# MEDVASTR BACKEND — application.properties
# Edit DB credentials before running
# ============================================================

server.port=8080
spring.application.name=medvastr

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medvastr_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:MedvastrSuperSecretJwtKey2026PremiumMedicalApparelMumbaiIndia!}
app.jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# ── Razorpay ─────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY:rzp_test_YOUR_KEY_ID}
razorpay.key.secret=${RAZORPAY_SECRET:YOUR_RAZORPAY_SECRET}

# ── Shiprocket ───────────────────────────────────────────────
shiprocket.enabled=${SHIPROCKET_ENABLED:false}
shiprocket.email=${SHIPROCKET_EMAIL:medvastr@gmail.com}
shiprocket.password=${SHIPROCKET_PASS:YOUR_SHIPROCKET_PASSWORD}

# ── Gmail OTP (disabled — set true when ready) ──────────────
otp.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=medvastr@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── Logging ──────────────────────────────────────────────────
logging.level.com.medvastr=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
