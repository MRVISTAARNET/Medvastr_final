# ============================================================
# MEDVASTR BACKEND — application.properties (local / default)
# Set secrets via environment variables — never commit real values.
# ============================================================

server.port=8080
spring.application.name=medvastr

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medvastr_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.devtools.restart.enabled=false

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dev-only-change-me-use-64-char-random-string-for-production-abc123}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# ── Frontend URL ─────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ── Admin bootstrap (optional — only creates admin if password is set) ──
app.admin.email=${ADMIN_EMAIL:medvastr@gmail.com}
app.admin.password=${ADMIN_INITIAL_PASSWORD:Medvastr@123}

# ── Razorpay ─────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# ── Shiprocket ───────────────────────────────────────────────
shiprocket.enabled=${SHIPROCKET_ENABLED:false}
shiprocket.email=${SHIPROCKET_EMAIL:}
shiprocket.password=${SHIPROCKET_PASSWORD:}
shiprocket.pickup_location=${SHIPROCKET_PICKUP_LOCATION:work}
shiprocket.pickup_postcode=${SHIPROCKET_PICKUP_POSTCODE:400063}

# ── SMTP ─────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtpout.secureserver.net}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:info@medvastr.com}
spring.mail.password=${MAIL_PASSWORD:MedvastrTest2026}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=${MAIL_DEBUG:true}

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=30MB

# ── AWS S3 (prefer IAM role on EB; leave keys empty in production) ──
aws.s3.bucket-name=${AWS_S3_BUCKET:medvastr-assets}
aws.s3.region=${AWS_S3_REGION:ap-south-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretKey=${AWS_SECRET_ACCESS_KEY:}

# ── OpenAPI / Swagger (enabled for local dev) ──────────────────
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# ── Logging ──────────────────────────────────────────────────
logging.level.com.medvastr=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
