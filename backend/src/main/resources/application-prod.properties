# ============================================================
# MEDVASTR BACKEND — PRODUCTION (AWS Elastic Beanstalk)
# All secrets MUST be set as EB environment variables.
# ============================================================

server.port=8080
spring.application.name=medvastr

# -- Database (AWS RDS) ----------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-test-query=SELECT 1

# Prefer validate/none once migration_v4 is applied on RDS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# -- JWT -------------------------------------------------------
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# -- CORS & URLs -----------------------------------------------
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://medvastr.com,https://www.medvastr.com}
app.frontend.url=${FRONTEND_URL:https://medvastr.com}

# -- Admin bootstrap -------------------------------------------
app.admin.email=${ADMIN_EMAIL:admin@medvastr.com}
app.admin.password=${ADMIN_INITIAL_PASSWORD:}

# -- Razorpay --------------------------------------------------
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# -- Shiprocket ------------------------------------------------
shiprocket.enabled=${SHIPROCKET_ENABLED:true}
shiprocket.email=${SHIPROCKET_EMAIL}
shiprocket.password=${SHIPROCKET_PASSWORD}
shiprocket.pickup_location=${SHIPROCKET_PICKUP_LOCATION:work}

# -- SMTP ------------------------------------------------------
spring.mail.host=${MAIL_HOST:smtpout.secureserver.net}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=${MAIL_DEBUG:true}

# -- File Upload -----------------------------------------------
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# -- AWS S3 (use IAM instance profile — do not set access keys) --
aws.s3.bucket-name=${AWS_S3_BUCKET:medvastr-assets}
aws.s3.region=${AWS_S3_REGION:ap-south-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretKey=${AWS_SECRET_ACCESS_KEY:}

# -- Swagger disabled in production ----------------------------
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# -- Logging ---------------------------------------------------
logging.level.com.medvastr=INFO
logging.level.org.springframework.security=WARN
